<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Psygil — Geometric / Low-Poly Fox Face Logo -->
  <!-- Style: sharp triangular facets, bold flat colors, origami-inspired -->

  <!-- Ears — tall pointed triangles -->
  <polygon points="8,28 18,4 24,24" fill="#E8650A"/>
  <polygon points="56,28 46,4 40,24" fill="#E8650A"/>
  <!-- Inner ear accents -->
  <polygon points="13,26 18,9 22,24" fill="#1a1a2e"/>
  <polygon points="51,26 46,9 42,24" fill="#1a1a2e"/>

  <!-- Head — main face shape (angular diamond/shield) -->
  <!-- Left face -->
  <polygon points="8,28 32,20 24,24" fill="#E8650A"/>
  <polygon points="56,28 32,20 40,24" fill="#E8650A"/>
  <!-- Upper cheeks -->
  <polygon points="8,28 32,20 20,42" fill="#F07B1A"/>
  <polygon points="56,28 32,20 44,42" fill="#F07B1A"/>
  <!-- Lower cheeks -->
  <polygon points="8,28 20,42 14,38" fill="#D45A00"/>
  <polygon points="56,28 44,42 50,38" fill="#D45A00"/>

  <!-- Central face — lighter mask area -->
  <polygon points="32,20 20,42 32,54" fill="#F5A623"/>
  <polygon points="32,20 44,42 32,54" fill="#F5A623"/>

  <!-- Inner face / snout — white area -->
  <polygon points="32,32 22,42 32,54" fill="#FFFFFF"/>
  <polygon points="32,32 42,42 32,54" fill="#F0F0F0"/>

  <!-- Nose — dark triangle -->
  <polygon points="28,40 36,40 32,44" fill="#1a1a2e"/>

  <!-- Eyes — angular slits -->
  <polygon points="21,30 27,28 25,34" fill="#1a1a2e"/>
  <polygon points="43,30 37,28 39,34" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <polygon points="23,30 26,29 24.5,31.5" fill="#FFFFFF" opacity="0.7"/>
  <polygon points="41,30 38,29 39.5,31.5" fill="#FFFFFF" opacity="0.7"/>

  <!-- Brow lines — sharp angles above eyes -->
  <polygon points="18,27 27,26 24,29" fill="#D45A00"/>
  <polygon points="46,27 37,26 40,29" fill="#D45A00"/>

  <!-- Chin point accent -->
  <polygon points="26,48 32,54 38,48" fill="#E8E8E8"/>
</svg>
