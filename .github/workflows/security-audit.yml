name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8 AM UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd app && npm ci
      - run: cd app && npm audit --audit-level=high

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit -r sidecar/requirements.txt

  electron-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd app && npm ci
      - name: Check Electron security
        run: |
          cd app
          # Verify contextIsolation is enabled
          grep -q "contextIsolation: true" src/main/index.ts || { echo "FAIL: contextIsolation not enabled"; exit 1; }
          # Verify nodeIntegration is disabled
          grep -q "nodeIntegration: false" src/main/index.ts || { echo "FAIL: nodeIntegration not disabled"; exit 1; }
          # Verify no remote module usage
          ! grep -rq "enableRemoteModule" src/ || { echo "FAIL: remote module found"; exit 1; }
          # Verify CSP exists
          grep -q "Content-Security-Policy" src/renderer/index.html || { echo "FAIL: No CSP found"; exit 1; }
          echo "✅ Electron security checks passed"
