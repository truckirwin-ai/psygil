<!DOCTYPE html>
<html>
<head><title>Psygil Logo Preview</title>
<style>
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 40px; font-family: system-ui; color: #fff; }
.row { display: flex; gap: 60px; align-items: center; }
.preview { text-align: center; }
.preview p { margin-top: 12px; opacity: 0.6; font-size: 13px; }
.dark { background: #1a1a2e; padding: 20px; border-radius: 12px; }
.light { background: #ffffff; padding: 20px; border-radius: 12px; }
.titlebar { display: flex; align-items: center; gap: 8px; background: #12121f; padding: 8px 16px; border-radius: 6px; }
.titlebar span { color: #e0e0e0; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
</style>
</head>
<body>
<h2>Psygil Logo — Geometric Fox</h2>
<div class="row">
  <div class="preview dark">
    <img src="psygil_logo.svg" width="128" height="128">
    <p>128px — Dark BG</p>
  </div>
  <div class="preview light">
    <img src="psygil_logo.svg" width="128" height="128">
    <p>128px — Light BG</p>
  </div>
  <div class="preview dark">
    <img src="psygil_logo.svg" width="64" height="64">
    <p>64px</p>
  </div>
  <div class="preview dark">
    <img src="psygil_logo.svg" width="32" height="32">
    <p>32px</p>
  </div>
  <div class="preview dark">
    <img src="psygil_logo.svg" width="20" height="20">
    <p>20px</p>
  </div>
</div>
<div class="row">
  <div class="titlebar">
    <img src="psygil_logo.svg" width="20" height="20">
    <span>PSYGIL</span>
  </div>
</div>
</body>
</html>
