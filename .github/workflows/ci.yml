name: CI

on:
  push:
    branches: [main, recovery/*]
  pull_request:
    branches: [main, recovery/*]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: cd app && npm ci --legacy-peer-deps

      - name: Typecheck (Node)
        run: cd app && npx tsc -p tsconfig.node.json --noEmit && npx tsc -p tsconfig.web.json --noEmit

      - name: Unit and integration tests
        continue-on-error: true
        run: cd app && npm test

      - name: HARD RULE scan
        if: always()
        run: |
          set +e
          found_violations=0

          # Grep for em dashes (U+2014) and en dashes (U+2013)
          if grep -r --include="*.ts" --include="*.tsx" --include="*.md" --include="*.sql" \
            $'[\u2014\u2013]' app/src/ app/tests/ docs/ --exclude-dir=node_modules --exclude-dir=out --exclude-dir=dist 2>/dev/null; then
            echo "ERROR: Found em dashes or en dashes in source files"
            found_violations=1
          fi

          # Grep for AI watermark/attribution strings
          if grep -r --include="*.ts" --include="*.tsx" --include="*.md" --include="*.sql" \
            -E "(Generated by AI|Co-authored by Claude|Co-authored-by|Co-Authored-By)" \
            app/src/ app/tests/ docs/ --exclude-dir=node_modules --exclude-dir=out --exclude-dir=dist 2>/dev/null; then
            echo "ERROR: Found AI watermark/attribution strings in source files"
            found_violations=1
          fi

          if [ $found_violations -eq 1 ]; then
            exit 1
          fi
          echo "HARD RULE scan passed"

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Upload debug artifacts on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: app/out/
