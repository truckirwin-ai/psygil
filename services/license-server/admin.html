<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psygil License Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; font-size: 14px; line-height: 1.5; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #161b22; border-right: 1px solid #30363d; padding: 24px 16px; flex-shrink: 0; }
    .sidebar h1 { font-size: 16px; font-weight: 700; color: #58a6ff; margin-bottom: 24px; }
    .sidebar nav a { display: block; padding: 8px 12px; border-radius: 6px; color: #8b949e; text-decoration: none; margin-bottom: 4px; font-size: 13px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #21262d; color: #e6edf3; }
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #e6edf3; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
    .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 7px 10px; font-size: 13px; margin-bottom: 12px; }
    input:focus, select:focus { outline: none; border-color: #58a6ff; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger { background: #da3633; color: #fff; font-size: 12px; padding: 4px 10px; }
    .btn-danger:hover { background: #f85149; }
    .api-key-row { display: flex; gap: 8px; margin-bottom: 20px; align-items: flex-end; }
    .api-key-row input { margin-bottom: 0; flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 500; border-bottom: 1px solid #21262d; }
    td { padding: 10px 12px; border-bottom: 1px solid #21262d; vertical-align: middle; }
    tr:hover td { background: #1c2128; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-solo { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb; }
    .badge-practice { background: #1a7f3722; color: #3fb950; border: 1px solid #238636; }
    .badge-enterprise { background: #6e40c922; color: #bc8cff; border: 1px solid #6e40c9; }
    .badge-revoked { background: #da363322; color: #f85149; border: 1px solid #da3633; }
    .badge-ok { background: #1a7f3722; color: #3fb950; border: 1px solid #238636; }
    .mono { font-family: "SF Mono", ui-monospace, Consolas, monospace; font-size: 12px; }
    .notice { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .notice-ok { background: #1a7f3722; border: 1px solid #238636; color: #3fb950; }
    .notice-err { background: #da363322; border: 1px solid #da3633; color: #f85149; }
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    .pagination button { padding: 6px 12px; background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .pagination span { color: #8b949e; font-size: 12px; }
    #notice { display: none; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>Psygil Admin</h1>
    <nav>
      <a href="#" class="active" onclick="showSection('licenses')">Licenses</a>
      <a href="#" onclick="showSection('create')">Create License</a>
    </nav>
  </aside>
  <main class="main">
    <div id="notice" class="notice"></div>

    <!-- Auth bar -->
    <div class="card">
      <h3>Admin API Key</h3>
      <div class="api-key-row">
        <div style="flex:1">
          <label for="apiKey">API Key (stored in sessionStorage)</label>
          <input type="password" id="apiKey" placeholder="Enter your ADMIN_API_KEY">
        </div>
        <button class="btn-primary" onclick="saveKey()">Save</button>
        <button onclick="clearKey()" style="background:#21262d;color:#e6edf3;border:1px solid #30363d;">Clear</button>
      </div>
    </div>

    <!-- Licenses table -->
    <div id="section-licenses">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2>Licenses</h2>
        <button class="btn-primary" onclick="loadLicenses()">Refresh</button>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <h3>Filters</h3>
        <div class="row">
          <div>
            <label>Tier</label>
            <select id="filterTier" onchange="loadLicenses()">
              <option value="">All tiers</option>
              <option value="solo">Solo</option>
              <option value="practice">Practice</option>
              <option value="enterprise">Enterprise</option>
            </select>
          </div>
          <div>
            <label>Customer ID</label>
            <input type="text" id="filterCustomer" placeholder="Optional" onchange="loadLicenses()">
          </div>
        </div>
      </div>

      <div class="card">
        <table id="licenseTable">
          <thead>
            <tr>
              <th>Key</th>
              <th>Tier</th>
              <th>Seats</th>
              <th>Customer ID</th>
              <th>Issued</th>
              <th>Expires</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="licenseBody">
            <tr><td colspan="8" style="text-align:center;color:#8b949e;padding:32px;">Load the API key above then click Refresh.</td></tr>
          </tbody>
        </table>
        <div class="pagination">
          <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
          <span id="pageInfo">Page 1</span>
          <button id="nextBtn" onclick="changePage(1)" disabled>Next</button>
        </div>
      </div>
    </div>

    <!-- Create license -->
    <div id="section-create" style="display:none;">
      <h2>Create License</h2>
      <div class="card" style="max-width:480px;">
        <h3>New License</h3>
        <label for="newTier">Tier</label>
        <select id="newTier" onchange="updateSeatsDefault()">
          <option value="solo">Solo (1 seat)</option>
          <option value="practice">Practice</option>
          <option value="enterprise">Enterprise</option>
        </select>

        <label for="newSeats">Seats</label>
        <input type="number" id="newSeats" value="1" min="1" max="999">

        <label for="newCustomer">Customer ID (optional)</label>
        <input type="text" id="newCustomer" placeholder="cust_xxxx">

        <label for="newExpires">Expires At (optional, ISO 8601)</label>
        <input type="text" id="newExpires" placeholder="2027-01-01T00:00:00Z">

        <button class="btn-primary" onclick="createLicense()">Create License</button>
      </div>
    </div>
  </main>
</div>

<script>
  let currentPage = 1
  const pageSize = 20

  function getKey() {
    return sessionStorage.getItem('psygil_admin_key') || ''
  }

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim()
    if (val) {
      sessionStorage.setItem('psygil_admin_key', val)
      showNotice('API key saved for this session.', 'ok')
    }
  }

  function clearKey() {
    sessionStorage.removeItem('psygil_admin_key')
    document.getElementById('apiKey').value = ''
    showNotice('API key cleared.', 'ok')
  }

  function showSection(name) {
    document.getElementById('section-licenses').style.display = name === 'licenses' ? '' : 'none'
    document.getElementById('section-create').style.display = name === 'create' ? '' : 'none'
  }

  function showNotice(msg, type) {
    const el = document.getElementById('notice')
    el.textContent = msg
    el.className = 'notice notice-' + (type === 'ok' ? 'ok' : 'err')
    el.style.display = 'block'
    setTimeout(() => { el.style.display = 'none' }, 4000)
  }

  async function apiFetch(url, opts) {
    const key = getKey()
    const headers = { 'Content-Type': 'application/json', 'X-Admin-Api-Key': key, ...(opts.headers || {}) }
    const res = await fetch(url, { ...opts, headers })
    if (res.status === 401) throw new Error('Unauthorized: check API key')
    const body = await res.json()
    if (!res.ok) throw new Error(body.error || 'Request failed')
    return body
  }

  async function loadLicenses() {
    const tier = document.getElementById('filterTier').value
    const customer = document.getElementById('filterCustomer').value.trim()
    let url = `/v1/admin/licenses?page=${currentPage}&limit=${pageSize}`
    if (tier) url += `&tier=${encodeURIComponent(tier)}`
    if (customer) url += `&customer_id=${encodeURIComponent(customer)}`
    try {
      const data = await apiFetch(url, { method: 'GET' })
      renderTable(data)
    } catch (err) {
      showNotice(err.message, 'err')
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('licenseBody')
    if (!data.licenses || data.licenses.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#8b949e;padding:32px;">No licenses found.</td></tr>'
    } else {
      tbody.innerHTML = data.licenses.map(l => {
        const tier = l.tier || ''
        const status = l.revoked_at ? 'revoked' : 'ok'
        const issuedDate = l.issued_at ? new Date(l.issued_at).toLocaleDateString() : ''
        const expiresDate = l.expires_at ? new Date(l.expires_at).toLocaleDateString() : 'Never'
        return `<tr>
          <td class="mono">${l.key}</td>
          <td><span class="badge badge-${tier}">${tier}</span></td>
          <td>${l.seats}</td>
          <td class="mono" style="font-size:11px;">${l.customer_id || ''}</td>
          <td>${issuedDate}</td>
          <td>${expiresDate}</td>
          <td><span class="badge badge-${status}">${status}</span></td>
          <td>${status === 'ok' ? `<button class="btn-danger" onclick="doRevoke('${l.key}')">Revoke</button>` : ''}</td>
        </tr>`
      }).join('')
    }
    const total = data.total || 0
    const totalPages = Math.max(1, Math.ceil(total / pageSize))
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${total} total)`
    document.getElementById('prevBtn').disabled = currentPage <= 1
    document.getElementById('nextBtn').disabled = currentPage >= totalPages
  }

  function changePage(delta) {
    currentPage = Math.max(1, currentPage + delta)
    loadLicenses()
  }

  async function doRevoke(key) {
    if (!confirm(`Revoke license ${key}? This cannot be undone.`)) return
    try {
      await apiFetch(`/v1/admin/licenses/${encodeURIComponent(key)}/revoke`, { method: 'POST', body: '{}' })
      showNotice('License revoked.', 'ok')
      loadLicenses()
    } catch (err) {
      showNotice(err.message, 'err')
    }
  }

  function updateSeatsDefault() {
    const tier = document.getElementById('newTier').value
    const seats = document.getElementById('newSeats')
    if (tier === 'solo') seats.value = '1'
    else if (tier === 'practice') seats.value = '5'
    else seats.value = '25'
  }

  async function createLicense() {
    const tier = document.getElementById('newTier').value
    const seats = parseInt(document.getElementById('newSeats').value, 10)
    const customerId = document.getElementById('newCustomer').value.trim()
    const expiresAt = document.getElementById('newExpires').value.trim()

    const payload = { tier, seats }
    if (customerId) payload.customer_id = customerId
    if (expiresAt) payload.expires_at = expiresAt

    try {
      const data = await apiFetch('/v1/admin/licenses', { method: 'POST', body: JSON.stringify(payload) })
      showNotice(`Created: ${data.license.key}`, 'ok')
      showSection('licenses')
      loadLicenses()
    } catch (err) {
      showNotice(err.message, 'err')
    }
  }

  // Restore key from sessionStorage on load
  window.addEventListener('DOMContentLoaded', () => {
    const k = sessionStorage.getItem('psygil_admin_key')
    if (k) document.getElementById('apiKey').value = k
  })
</script>
</body>
</html>
